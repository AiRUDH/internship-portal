<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — MySock Internships</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>

<div class="form-page" style="background:linear-gradient(135deg,#111827,#1e1b4b);">
  <div class="form-card">
    <div class="form-logo">MySock</div>
    <h2>Admin Login</h2>
    <p class="subtitle">Internship Portal — Admin Access Only</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="info.mysock@zohomail.in" autocomplete="email" />
        <div class="form-error" id="loginEmailError">Please enter a valid email.</div>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
        <div class="form-error" id="loginPasswordError">Please enter your password.</div>
      </div>
      <div class="form-general-error" id="loginGeneralError"></div>
      <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%;justify-content:center;">
        Sign In
      </button>
    </form>

    <p style="text-align:center;margin-top:1.25rem;font-size:0.85rem;color:var(--text-light);">
      <a href="index.html" style="color:var(--primary);">← Back to listings</a>
    </p>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="script.js"></script>
</body>
</html>
